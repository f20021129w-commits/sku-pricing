<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>沃尔玛SKU算价系统</title><script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#333}.container{max-width:1400px;margin:0 auto;padding:20px}.header{background:#1a73e8;color:#fff;padding:16px 24px;border-radius:8px;margin-bottom:24px}.header h1{font-size:22px;font-weight:600}.header .sub{font-size:13px;opacity:.85}.layout{display:grid;grid-template-columns:1fr 1fr;gap:20px}.card{background:#fff;border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08)}.card h2{font-size:16px;color:#1a73e8;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #e8edf2}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.form-group{display:flex;flex-direction:column}.form-group label{font-size:12px;color:#666;margin-bottom:3px;font-weight:500}.form-group input{padding:7px 10px;border:1px solid #d0d5dd;border-radius:6px;font-size:13px}.form-group input:focus{outline:none;border-color:#1a73e8;box-shadow:0 0 0 2px rgba(26,115,232,.15)}.form-section{margin-bottom:16px}.form-section h3{font-size:13px;color:#555;margin-bottom:8px;font-weight:600}.btn{padding:8px 20px;border:none;border-radius:6px;font-size:14px;cursor:pointer;font-weight:500}.btn-primary{background:#1a73e8;color:#fff}.btn-primary:hover{background:#1557b0}.btn-success{background:#0d9488;color:#fff}.btn-success:hover{background:#0f766e}.btn-warning{background:#d97706;color:#fff}.btn-warning:hover{background:#b45309}.btn-sm{padding:5px 12px;font-size:12px}.actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}.result-card{border:1px solid #e5e7eb;border-radius:8px;padding:14px}.result-card h4{font-size:14px;color:#1a73e8;margin-bottom:10px}.result-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid #f3f4f6}.result-row:last-child{border-bottom:none}.result-row .label{color:#666}.result-row .value{font-weight:500}.result-row .value.profit{color:#0d9488}.result-row .value.loss{color:#dc2626}.search-section{display:flex;gap:10px;margin-bottom:16px}.search-section input{flex:1;padding:8px 12px;border:1px solid #d0d5dd;border-radius:6px;font-size:14px}.sku-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}.sku-tag{padding:4px 12px;background:#e8f0fe;color:#1a73e8;border-radius:14px;font-size:12px;cursor:pointer}.sku-tag:hover{background:#d2e3fc}.history-table{width:100%;border-collapse:collapse;font-size:12px}.history-table th{background:#f8f9fa;padding:8px 6px;text-align:left;font-weight:600;color:#555;border-bottom:2px solid #e5e7eb}.history-table td{padding:7px 6px;border-bottom:1px solid #f0f0f0;cursor:pointer}.history-table tr:hover td{background:#f8faff}.history-wrapper{max-height:500px;overflow-y:auto}.empty-state{text-align:center;padding:40px 20px;color:#999}.channel-tabs{display:flex;gap:8px;margin-bottom:8px}.channel-tab{padding:4px 14px;border-radius:14px;font-size:12px;cursor:pointer;border:1px solid #d0d5dd;background:#fff}.channel-tab.active{background:#1a73e8;color:#fff;border-color:#1a73e8}.tab-content{display:none}.tab-content.active{display:block}.notice{background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:8px 12px;font-size:12px;color:#92400e;margin-bottom:12px}.toast{position:fixed;top:20px;right:20px;background:#0d9488;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:999;opacity:0;transform:translateY(-10px);transition:all .3s}.toast.show{opacity:1;transform:translateY(0)}.toast.error{background:#dc2626}.history-table .profit{color:#0d9488;font-weight:500}.history-table .loss{color:#dc2626;font-weight:500}@media(max-width:900px){.layout{grid-template-columns:1fr}}</style></head><body><div class="container"><div class="header"><h1>沃尔玛 SKU 算价系统</h1><div class="sub">基于算价表模板 · 汇率 ¥6.8 · 数据存储在浏览器本地</div></div><div class="layout"><div><div class="card"><h2>📋 新建算价</h2><div class="notice">填写产品参数和预估售价，系统自动计算各渠道成本利润。WFS物流费已集成分段自动计价。</div><div class="form-section"><h3>SKU & 产品参数</h3><div class="form-grid"><div class="form-group"><label>SKU *</label><input id="sku" placeholder="如: ABC-001"></div><div class="form-group"><label>采购成本（RMB）</label><input id="purchaseCost" type="number" step="0.01" value="32.6"></div><div class="form-group"><label>重量（G）</label><input id="weightG" type="number" step="1" value="1100"></div><div class="form-group"><label>长（厘米）</label><input id="lengthCm" type="number" step="0.1" value="30"></div><div class="form-group"><label>宽（厘米）</label><input id="widthCm" type="number" step="0.1" value="21.5"></div><div class="form-group"><label>高（厘米）</label><input id="heightCm" type="number" step="0.1" value="9"></div><div class="form-group"><label>备注</label><input id="notes" placeholder="可选备注"></div></div></div><div class="form-section"><h3>铭志至尊达（头程 ¥16/KG）</h3><div class="form-grid"><div class="form-group"><label>预估售价 $</label><input id="zdPrice" type="number" step="0.01" value="12.99"></div><div class="form-group"><label>头程单价（RMB/KG）</label><input id="zdFirstMile" type="number" step="0.5" value="16"></div><div class="form-group"><label>沃尔玛物流费 $</label><input id="zdWfs" type="number" step="0.01" value="3.45"></div></div></div><div class="form-section"><h3>美国普船（头程 ¥12/KG）</h3><div class="form-grid"><div class="form-group"><label>预估售价 $</label><input id="pcPrice" type="number" step="0.01" value="22.99"></div><div class="form-group"><label>头程单价（RMB/KG）</label><input id="pcFirstMile" type="number" step="0.5" value="12"></div><div class="form-group"><label>沃尔玛物流费 $</label><input id="pcWfs" type="number" step="0.01" value="5.45"></div></div></div><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><input type="checkbox" id="autoWfs" checked onchange="if(this.checked){calcWfsFeeAuto()}"><label for="autoWfs" style="font-size:12px;color:#666">自动计算WFS物流费（按分段价格表）</label></div><div class="actions"><button class="btn btn-primary" onclick="btnCalculate()">🧮 计算</button><button class="btn btn-success" onclick="btnSave()">💾 保存记录</button><button class="btn btn-warning btn-sm" onclick="exportAll()">📥 导出全部Excel</button></div><div id="calcResult" style="display:none;margin-top:16px"><h3 style="font-size:14px;color:#333;margin-bottom:8px">计算结果</h3><div class="channel-tabs"><div class="channel-tab active" data-tab="tabZd" onclick="switchTab('tabZd',this)">铭志至尊达</div><div class="channel-tab" data-tab="tabPc" onclick="switchTab('tabPc',this)">美国普船</div></div><div id="tabZd" class="tab-content active"></div><div id="tabPc" class="tab-content"></div></div></div></div><div><div class="card"><h2>🔍 SKU 历史查询</h2><div class="search-section"><input id="searchSku" placeholder="输入 SKU 搜索..." onkeydown="if(event.key==='Enter')searchHistory()"><button class="btn btn-primary btn-sm" onclick="searchHistory()">搜索</button><button class="btn btn-warning btn-sm" onclick="exportCurrent()">📥 导出当前SKU</button></div><div id="skuTags"></div><div class="history-wrapper" id="historyWrapper"><div class="empty-state"><p>输入 SKU 搜索历史记录</p></div></div></div></div></div></div><div id="toast" class="toast"></div><script>var EXCHANGE_RATE = 6.8;var DB_KEY = 'sku_pricing_db';var lastResult = null;function db(){try{return JSON.parse(localStorage.getItem(DB_KEY)||'[]')}catch(e){return[]}}function dbSave(d){localStorage.setItem(DB_KEY,JSON.stringify(d))}function toast(m,e){var t=document.getElementById('toast');t.textContent=m;t.className='toast'+(e?' error':'')+' show';setTimeout(function(){t.className='toast'},2500)}function getVal(id){return parseFloat(document.getElementById(id).value)||0}function getStr(id){return document.getElementById(id).value.trim()}function calcWfsFee(bl,wg){if(wg<340)return 3.45;var w=Math.ceil(bl);if(w<=1)return 3.45;if(w===2)return 4.95;if(w===3)return 5.45;if(w<=20)return 5.75+0.40*(w-4);if(w<=30)return 15.55+0.40*(w-21);if(w<=50)return 14.55+0.40*(w-31);return 17.55+0.40*(w-51)}function calcPricing(pc,wg,lc,wc,hc,zsp,zfmp,zwf,psp,pfmp,pwf){var wk=wg/1000,vc=lc*wc*hc,vwk=vc/6000,dw=Math.max(wk,vwk);var li=lc/2.54,wi=wc/2.54,hi=hc/2.54,vi=li*wi*hi;function ch(lb,sp,fmp,wfs){var pcu=pc/6.8,fmr=dw*fmp,fmu=fmr/6.8;var cm=sp*0.15,ad=sp*0.15,rf=sp*0.03,ot=sp*0.05;var tc=pcu+fmu+cm+wfs+ad+rf+ot,pu=sp-tc,pm=(pu/sp)*100,pr=pu*6.8;var wlb=wg/453.592,alm=wlb+0.25,dlb=vi/139+0.25,blm=Math.max(alm,dlb);return{sellingPrice:+sp.toFixed(2),purchaseCostUSD:+pcu.toFixed(4),firstMileUSD:+fmu.toFixed(4),commission:+cm.toFixed(4),wfsFee:+wfs.toFixed(2),adFee:+ad.toFixed(4),refundFee:+rf.toFixed(4),otherFees:+ot.toFixed(4),totalCostUSD:+tc.toFixed(4),profitUSD:+pu.toFixed(4),profitMarginPct:+pm.toFixed(2),profitRMB:+pr.toFixed(2),dimWeightKg:+dw.toFixed(4),firstMileRMB:+fmr.toFixed(4),weightLb:+wlb.toFixed(4),actualLastMileLb:+alm.toFixed(4),dimWeightLb:+dlb.toFixed(4),billableLastMileLb:+blm.toFixed(4)}}return{zdResult:ch('铸志至尊达',zsp,zfmp,zwf),pcResult:ch('美国普船',psp,pfmp,pwf)}}function renderCard(r){var a=[['预估售价 $',r.sellingPrice],['采购费用 $',r.purchaseCostUSD],['头程费用 $',r.firstMileUSD],['平台佣金(15%) $',r.commission],['WFS物流费 $',r.wfsFee],['广告费(15%) $',r.adFee],['退款费(3%) $',r.refundFee],['其他费用(5%) $',r.otherFees],['总成本 $',r.totalCostUSD],['利润额 $',r.profitUSD],['利润率',r.profitMarginPct+'%'],['利润额(RMB)',r.profitRMB]];var cl=r.profitUSD>=0?'profit':'loss';var h='<div class=\'result-card\'>';a.forEach(function(x){h+='<div class=\'result-row\'><span class=\'label\'>'+x[0]+'</span><span class=\'value '+cl+'\'>'+x[1]+'</span></div>'});h+='</div><div class=\'result-card\' style=\'margin-top:8px\'><h4>头程 & 尾程明细</h4>';var d=[['实重(KG)',r.dimWeightKg],['头程费用(RMB)',r.firstMileRMB],['实重(LB)',r.weightLb],['实重+包装(LB)',r.actualLastMileLb],['体积重+包装(LB)',r.dimWeightLb],['计费尾程(LB)',r.billableLastMileLb]];d.forEach(function(x){h+='<div class=\'result-row\'><span class=\'label\'>'+x[0]+'</span><span class=\'value\'>'+x[1]+'</span></div>'});return h+'</div>'}function switchTab(id,el){document.querySelectorAll('.tab-content,.channel-tab').forEach(function(t){t.classList.remove('active')});document.getElementById(id).classList.add('active');el.classList.add('active')}function btnCalculate(){var wg=getVal('weightG'),lc=getVal('lengthCm'),wc=getVal('widthCm'),hc=getVal('heightCm');var wk=wg/1000,vc=lc*wc*hc,vwk=vc/6000,dw=Math.max(wk,vwk);var li=lc/2.54,wi=wc/2.54,hi=hc/2.54,vi=li*wi*hi;var wlb=wg/453.592,alm=wlb+0.25,dlb=vi/139+0.25,blm=Math.max(alm,dlb);if(getStr('autoWfs')!=='no'){var fee=calcWfsFee(blm,wg);document.getElementById('zdWfs').value=fee;document.getElementById('pcWfs').value=fee}var r=calcPricing(getVal('purchaseCost'),wg,lc,wc,hc,getVal('zdPrice'),getVal('zdFirstMile'),getVal('zdWfs'),getVal('pcPrice'),getVal('pcFirstMile'),getVal('pcWfs'));lastResult=r;document.getElementById('calcResult').style.display='block';document.getElementById('tabZd').innerHTML=renderCard(r.zdResult);document.getElementById('tabPc').innerHTML=renderCard(r.pcResult);toast('计算完成')}function btnSave(){var sku=getStr('sku');if(!sku){toast('请输入SKU',true);return}if(!lastResult)btnCalculate();var rec={id:Date.now()+'_'+Math.random().toString(36).slice(2,8),sku:sku,created_at:new Date().toISOString(),notes:getStr('notes'),inputs:{purchaseCost:getVal('purchaseCost'),weightG:getVal('weightG'),lengthCm:getVal('lengthCm'),widthCm:getVal('widthCm'),heightCm:getVal('heightCm'),zdSellingPrice:getVal('zdPrice'),zdFirstMileUnitPrice:getVal('zdFirstMile'),zdWfsFee:getVal('zdWfs'),pcSellingPrice:getVal('pcPrice'),pcFirstMileUnitPrice:getVal('pcFirstMile'),pcWfsFee:getVal('pcWfs')},zdResult:lastResult.zdResult,pcResult:lastResult.pcResult};var data=db();data.push(rec);dbSave(data);toast('记录已保存: '+sku);loadSkuList();searchHistory()}function searchHistory(){var sku=getStr('searchSku');if(!sku){loadSkuList();return};var data=db().filter(function(r){return r.sku===sku});renderHistory(data,sku)}function renderHistory(recs,sku){var w=document.getElementById('historyWrapper');if(!recs||!recs.length){w.innerHTML='<div class=\'empty-state\'><p>未找到SKU '+sku+' 的历史记录</p></div>';return}var h='<table class=\'history-table\'><thead><tr><th>时间</th><th>采购(RMB)</th><th>重量(G)</th><th>至尊达利润%</th><th>普船利润%</th><th>备注</th></tr></thead><tbody>';recs.forEach(function(r){var zd=r.zdResult||{},pc=r.pcResult||{};var zp=zd.profitMarginPct!==undefined?zd.profitMarginPct+'%':'-',pp=pc.profitMarginPct!==undefined?pc.profitMarginPct+'%':'-',zc=zd.profitMarginPct>=0?'profit':'loss',pcc=pc.profitMarginPct>=0?'profit':'loss';var t=new Date(r.created_at);var ts=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0')+' '+String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0');h+='<tr onclick=\'loadRecord(\"'+r.id+'\")\'>'+'<td>'+ts+'</td><td>'+(r.inputs.purchaseCost||0)+'</td><td>'+(r.inputs.weightG||0)+'</td><td class=\''+zc+'\'>'+zp+'</td><td class=\''+pcc+'\'>'+pp+'</td><td>'+(r.notes||'')+'</td></tr>'});h+='</tbody></table><p style=\'margin-top:8px;font-size:12px;color:#888\'>共 '+recs.length+' 条记录（点击行加载详情）</p>';w.innerHTML=h}function loadRecord(id){var rec=db().filter(function(r){return r.id===id});if(!rec.length)return;rec=rec[0];lastResult={inputs:rec.inputs,zdResult:rec.zdResult,pcResult:rec.pcResult};document.getElementById('calcResult').style.display='block';document.getElementById('tabZd').innerHTML=renderCard(rec.zdResult);document.getElementById('tabPc').innerHTML=renderCard(rec.pcResult);document.getElementById('sku').value=rec.sku;var i=rec.inputs;if(i){document.getElementById('purchaseCost').value=i.purchaseCost;document.getElementById('weightG').value=i.weightG;document.getElementById('lengthCm').value=i.lengthCm;document.getElementById('widthCm').value=i.widthCm;document.getElementById('heightCm').value=i.heightCm;document.getElementById('zdPrice').value=i.zdSellingPrice;document.getElementById('zdFirstMile').value=i.zdFirstMileUnitPrice;document.getElementById('zdWfs').value=i.zdWfsFee;document.getElementById('pcPrice').value=i.pcSellingPrice;document.getElementById('pcFirstMile').value=i.pcFirstMileUnitPrice;document.getElementById('pcWfs').value=i.pcWfsFee;document.getElementById('notes').value=rec.notes||''}toast('已加载记录详情');document.querySelector('.layout').scrollIntoView({behavior:'smooth'})}function quickSearch(sku){document.getElementById('searchSku').value=sku;searchHistory()}function calcWfsFeeAuto(){var wg=getVal('weightG'),lc=getVal('lengthCm'),wc=getVal('widthCm'),hc=getVal('heightCm');if(!wg||!lc||!wc||!hc)return;var wlb=wg/453.592,vi=(lc/2.54)*(wc/2.54)*(hc/2.54),alm=wlb+0.25,dlb=vi/139+0.25,blm=Math.max(alm,dlb);var fee=calcWfsFee(blm,wg);document.getElementById('zdWfs').value=fee;document.getElementById('pcWfs').value=fee}function loadSkuList(){var data=db();var tags=document.getElementById('skuTags');if(!data.length){tags.innerHTML='';return}var map={};data.forEach(function(r){if(!map[r.sku]){map[r.sku]={count:0}};map[r.sku].count++});var sorted=Object.keys(map).sort(function(a,b){return map[b].count-map[a].count});var h='';sorted.forEach(function(s){h+='<span class=\'sku-tag\' onclick=\'quickSearch(\"'+s+'\")\'>'+s+' ('+map[s].count+')</span>'});tags.innerHTML=h}function exportCurrent(){var sku=getStr('searchSku');if(!sku){toast('请先搜索或选择SKU',true);return};var r=db().filter(function(x){return x.sku===sku});if(!r.length){toast('没有记录',true);return};doExport(r,sku)}function exportAll(){var d=db();if(!d.length){toast('没有记录',true);return};doExport(d,'全部SKU')}function doExport(recs,fn){var ed=recs.map(function(r,i){var zd=r.zdResult||{},pc=r.pcResult||{};return{'序号':i+1,'SKU':r.sku,'记录时间':r.created_at,'采购成本(RMB)':r.inputs.purchaseCost,'重量(G)':r.inputs.weightG,'长(cm)':r.inputs.lengthCm,'宽(cm)':r.inputs.widthCm,'高(cm)':r.inputs.heightCm,'备注':r.notes||'','[至尊达]预估售价$':zd.sellingPrice||'','[至尊达]头程费用$':zd.firstMileUSD||'','[至尊达]采购费用$':zd.purchaseCostUSD||'','[至尊达]平台佣金$':zd.commission||'','[至尊达]WFS物流费$':zd.wfsFee||'','[至尊达]广告费$':zd.adFee||'','[至尊达]退款费$':zd.refundFee||'','[至尊达]其他费用$':zd.otherFees||'','[至尊达]利润额$':zd.profitUSD||'','[至尊达]利润率%':zd.profitMarginPct||'','[至尊达]利润额(RMB)':zd.profitRMB||'','[普船]预估售价$':pc.sellingPrice||'','[普船]头程费用$':pc.firstMileUSD||'','[普船]采购费用$':pc.purchaseCostUSD||'','[普船]平台佣金$':pc.commission||'','[普船]WFS物流费$':pc.wfsFee||'','[普船]广告费$':pc.adFee||'','[普船]退款费$':pc.refundFee||'','[普船]其他费用$':pc.otherFees||'','[普船]利润额$':pc.profitUSD||'','[普船]利润率%':pc.profitMarginPct||'','[普船]利润额(RMB)':pc.profitRMB||''}});var ws=XLSX.utils.json_to_sheet(ed);var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'算价记录');ws['!cols']=Object.keys(ed[0]).map(function(k){return{wch:Math.max(k.length*2,18)}});XLSX.writeFile(wb,fn+'_历史记录.xlsx');toast('Excel已导出: '+fn+'_历史记录.xlsx')}loadSkuList();</script></body></html>

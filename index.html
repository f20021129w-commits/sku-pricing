="checkbox" id="autoWfs" checked onchange="if(this.checked){calcWfsFeeAuto()}"><label for="autoWfs" style="font-size:12px;color:#666">鑷姩璁＄畻WFS鐗╂祦璐癸紙鎸夊垎娈典环鏍艰〃锛?/label></div><div class="actions"><button class="btn btn-primary" onclick="btnCalculate()">馃М 璁＄畻</button><button class="btn btn-success" onclick="btnSave()">馃捑 淇濆瓨璁板綍</button><button class="btn btn-warning btn-sm" onclick="exportAll()">馃摜 瀵煎嚭鍏ㄩ儴Excel</button></div><div id="calcResult" style="display:none;margin-top:16px"><h3 style="font-size:14px;color:#333;margin-bottom:8px">璁＄畻缁撴灉</h3><div class="channel-tabs"><div class="channel-tab active" data-tab="tabZd" onclick="switchTab('tabZd',this)">閾織鑷冲皧杈?/div><div class="channel-tab" data-tab="tabPc" onclick="switchTab('tabPc',this)">缇庡浗鏅埞</div></div><div id="tabZd" class="tab-content active"></div><div id="tabPc" class="tab-content"></div></div></div></div><div><div class="card"><h2>馃攳 SKU 鍘嗗彶鏌ヨ</h2><div class="search-section"><input id="searchSku" placeholder="杈撳叆 SKU 鎼滅储..." onkeydown="if(event.key==='Enter')searchHistory()"><button class="btn btn-primary btn-sm" onclick="searchHistory()">鎼滅储</button><button class="btn btn-warning btn-sm" onclick="exportCurrent()">馃摜 瀵煎嚭褰撳墠SKU</button></div><div id="skuTags"></div><div class="history-wrapper" id="historyWrapper"><div class="empty-state"><p>杈撳叆 SKU 鎼滅储鍘嗗彶璁板綍</p></div></div></div></div></div></div><div id="toast" class="toast"></div><script>var EXCHANGE_RATE = 6.8;var DB_KEY = 'sku_pricing_db';var lastResult = null;function db(){try{return JSON.parse(localStorage.getItem(DB_KEY)||'[]')}catch(e){return[]}}function dbSave(d){localStorage.setItem(DB_KEY,JSON.stringify(d))}function toast(m,e){var t=document.getElementById('toast');t.textContent=m;t.className='toast'+(e?' error':'')+' show';setTimeout(function(){t.className='toast'},2500)}function getVal(id){return parseFloat(document.getElementById(id).value)||0}function getStr(id){return document.getElementById(id).value.trim()}function calcWfsFee(bl,wg){if(wg<340)return 3.45;var w=Math.ceil(bl);if(w<=1)return 3.45;if(w===2)return 4.95;if(w===3)return 5.45;if(w<=20)return 5.75+0.40*(w-4);if(w<=30)return 15.55+0.40*(w-21);if(w<=50)return 14.55+0.40*(w-31);return 17.55+0.40*(w-51)}function calcPricing(pc,wg,lc,wc,hc,zsp,zfmp,zwf,psp,pfmp,pwf){var wk=wg/1000,vc=lc*wc*hc,vwk=vc/6000,dw=Math.max(wk,vwk);var li=lc/2.54,wi=wc/2.54,hi=hc/2.54,vi=li*wi*hi;function ch(lb,sp,fmp,wfs){var pcu=pc/6.8,fmr=dw*fmp,fmu=fmr/6.8;var cm=sp*0.15,ad=sp*0.15,rf=sp*0.03,ot=sp*0.05;var tc=pcu+fmu+cm+wfs+ad+rf+ot,pu=sp-tc,pm=(pu/sp)*100,pr=pu*6.8;var wlb=wg/453.592,alm=wlb+0.25,dlb=vi/139+0.25,blm=Math.max(alm,dlb);return{sellingPrice:+sp.toFixed(2),purchaseCostUSD:+pcu.toFixed(4),firstMileUSD:+fmu.toFixed(4),commission:+cm.toFixed(4),wfsFee:+wfs.toFixed(2),adFee:+ad.toFixed(4),refundFee:+rf.toFixed(4),otherFees:+ot.toFixed(4),totalCostUSD:+tc.toFixed(4),profitUSD:+pu.toFixed(4),profitMarginPct:+pm.toFixed(2),profitRMB:+pr.toFixed(2),dimWeightKg:+dw.toFixed(4),firstMileRMB:+fmr.toFixed(4),weightLb:+wlb.toFixed(4),actualLastMileLb:+alm.toFixed(4),dimWeightLb:+dlb.toFixed(4),billableLastMileLb:+blm.toFixed(4)}}return{zdResult:ch('閾稿織鑷冲皧杈?,zsp,zfmp,zwf),pcResult:ch('缇庡浗鏅埞',psp,pfmp,pwf)}}function renderCard(r){var a=[['棰勪及鍞环 $',r.sellingPrice],['閲囪喘璐圭敤 $',r.purchaseCostUSD],['澶寸▼璐圭敤 $',r.firstMileUSD],['骞冲彴浣ｉ噾(15%) $',r.commission],['WFS鐗╂祦璐?$',r.wfsFee],['骞垮憡璐?15%) $',r.adFee],['閫€娆捐垂(3%) $',r.refundFee],['鍏朵粬璐圭敤(5%) $',r.otherFees],['鎬绘垚鏈?$',r.totalCostUSD],['鍒╂鼎棰?$',r.profitUSD],['鍒╂鼎鐜?,r.profitMarginPct+'%'],['鍒╂鼎棰?RMB)',r.profitRMB]];var cl=r.profitUSD>=0?'profit':'loss';var h='<div class=\'result-card\'>';a.forEach(function(x){h+='<div class=\'result-row\'><span class=\'label\'>'+x[0]+'</span><span class=\'value '+cl+'\'>'+x[1]+'</span></div>'});h+='</div><div class=\'result-card\' style=\'margin-top:8px\'><h4>澶寸▼ & 灏剧▼鏄庣粏</h4>';var d=[['瀹為噸(KG)',r.dimWeightKg],['澶寸▼璐圭敤(RMB)',r.firstMileRMB],['瀹為噸(LB)',r.weightLb],['瀹為噸+鍖呰(LB)',r.actualLastMileLb],['浣撶Н閲?鍖呰(LB)',r.dimWeightLb],['璁¤垂灏剧▼(LB)',r.billableLastMileLb]];d.forEach(function(x){h+='<div class=\'result-row\'><span class=\'label\'>'+x[0]+'</span><span class=\'value\'>'+x[1]+'</span></div>'});return h+'</div>'}function switchTab(id,el){document.querySelectorAll('.tab-content,.channel-tab').forEach(function(t){t.classList.remove('active')});document.getElementById(id).classList.add('active');el.classList.add('active')}function btnCalculate(){var wg=getVal('weightG'),lc=getVal('lengthCm'),wc=getVal('widthCm'),hc=getVal('heightCm');var wk=wg/1000,vc=lc*wc*hc,vwk=vc/6000,dw=Math.max(wk,vwk);var li=lc/2.54,wi=wc/2.54,hi=hc/2.54,vi=li*wi*hi;var wlb=wg/453.592,alm=wlb+0.25,dlb=vi/139+0.25,blm=Math.max(alm,dlb);if(getStr('autoWfs')!=='no'){var fee=calcWfsFee(blm,wg);document.getElementById('zdWfs').value=fee;document.getElementById('pcWfs').value=fee}var r=calcPricing(getVal('purchaseCost'),wg,lc,wc,hc,getVal('zdPrice'),getVal('zdFirstMile'),getVal('zdWfs'),getVal('pcPrice'),getVal('pcFirstMile'),getVal('pcWfs'));lastResult=r;document.getElementById('calcResult').style.display='block';document.getElementById('tabZd').innerHTML=renderCard(r.zdResult);document.getElementById('tabPc').innerHTML=renderCard(r.pcResult);toast('璁＄畻瀹屾垚')}function btnSave(){var sku=getStr('sku');if(!sku){toast('璇疯緭鍏KU',true);return}if(!lastResult)btnCalculate();var rec={id:Date.now()+'_'+Math.random().toString(36).slice(2,8),sku:sku,created_at:new Date().toISOString(),notes:getStr('notes'),inputs:{purchaseCost:getVal('purchaseCost'),weightG:getVal('weightG'),lengthCm:getVal('lengthCm'),widthCm:getVal('widthCm'),heightCm:getVal('heightCm'),zdSellingPrice:getVal('zdPrice'),zdFirstMileUnitPrice:getVal('zdFirstMile'),zdWfsFee:getVal('zdWfs'),pcSellingPrice:getVal('pcPrice'),pcFirstMileUnitPrice:getVal('pcFirstMile'),pcWfsFee:getVal('pcWfs')},zdResult:lastResult.zdResult,pcResult:lastResult.pcResult};var data=db();data.push(rec);dbSave(data);toast('璁板綍宸蹭繚瀛? '+sku);loadSkuList();search t.getElementById('widthCm').value=i.widthCm;document.getElementById('heightCm').value=i.heightCm;document.getElementById('zdPrice').value=i.zdSellingPrice;document.getElementById('zdFirstMile').value=i.zdFirstMileUnitPrice;document.getElementById('zdWfs').value=i.zdWfsFee;document.getElementById('pcPrice').value=i.pcSellingPrice;document.getElementById('pcFirstMile').value=i.pcFirstMileUnitPrice;document.getElementById('pcWfs').value=i.pcWfsFee;document.getElementById('notes').value=rec.notes||''}toast('宸插姞杞借褰曡鎯?);document.querySelector('.layout').scrollIntoView({behavior:'smooth'})}function quickSearch(sku){document.getElementById('searchSku').value=sku;searchHistory()}function calcWfsFeeAuto(){var wg=getVal('weightG'),lc=getVal('lengthCm'),wc=getVal('widthCm'),hc=getVal('heightCm');if(!wg||!lc||!wc||!hc)return;var wlb=wg/453.592,vi=(lc/2.54)*(wc/2.54)*(hc/2.54),alm=wlb+0.25,dlb=vi/139+0.25,blm=Math.max(alm,dlb);var fee=calcWfsFee(blm,wg);document.getElementById('zdWfs').value=fee;document.getElementById('pcWfs').value=fee}function loadSkuList(){var data=db();var tags=document.getElementById('skuTags');if(!data.length){tags.innerHTML='';return}var map={};data.forEach(function(r){if(!map[r.sku]){map[r.sku]={count:0}};map[r.sku].count++});var sorted=Object.keys(map).sort(function(a,b){return map[b].count-map[a].count});var h='';sorted.forEach(function(s){h+='<span class=\'sku-tag\' onclick=\'quickSearch(\"'+s+'\")\'>'+s+' ('+map[s].count+')</span>'});tags.innerHTML=h}function exportCurrent(){var sku=getStr('searchSku');if(!sku){toast('璇峰厛鎼滅储鎴栭€夋嫨SKU',true);return};var r=db().filter(function(x){return x.sku===sku});if(!r.length){toast('娌℃湁璁板綍',true);return};doExport(r,sku)}function exportAll(){var d=db();if(!d.length){toast('娌℃湁璁板綍',true);return};doExport(d,'鍏ㄩ儴SKU')}function doExport(recs,fn){var ed=recs.map(function(r,i){var zd=r.zdResult||{},pc=r.pcResult||{};return{'搴忓彿':i+1,'SKU':r.sku,'璁板綍鏃堕棿':r.created_at,'閲囪喘鎴愭湰(RMB)':r.inputs.purchaseCost,'閲嶉噺(G)':r.inputs.
